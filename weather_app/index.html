<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteo App</title>
    <link href="css/tailwind-output.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4">
    <div class="w-full max-w-4xl mb-18 flex flex-col items-center relative gap-4">
        <h1 id="cityTitle" class="text-3xl font-bold mt-[100px] text-center"> </h1>
        <input type="text" id="locationInp" placeholder="enter name of the city"
            class="w-full p-3 rounded-xl shadow bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">

    </div>

    <!-- Main card containing summary weather details -->
    <div id="absoluteCard" class="w-full max-w-4xl mt-6 bg-white p-6 rounded-2xl shadow">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-5xl font-bold" id="temperature">--°C</p>
                <p id="conditionIcon">--</p>
            </div>

            <div class="text-right">
                <p>Humidity: <span id="humidity">--%</span></p>
                <p>Millimetres Rain: <span id="rain">-- mm</span></p>
                <p>Probability Rain: <span id="rainProbability">--%</span></p>
                <p>Wind Speed: <span id="wind">-- km/h</span></p>
            </div>
        </div>
    </div>

    <div class="w-full max-w-4xl mt-6 relative group">

        <img src="icons/left-arrow.png" class="slider-arrow left" id="arrowLeft">

        <div id="weeklyCards" class=" relative flex  gap-4 mt-6 w-full max-w-4xl pb-2 px-4">
        </div>

        <img src="icons/right-arrow.png" class="slider-arrow right" id="arrowRight">

    </div>

    <!-- buttons for charts selection -->
    <div class="flex gap-2 mt-6">
        <button class="tab-btn bg-gray-300  px-4 py-2 rounded hover:bg-gray-400" data-type="temp">Temperature</button>
        <button class="tab-btn bg-gray-300 px-4 py-2 rounded hover:bg-gray-400" data-type="rain">Rain</button>
        <button class="tab-btn bg-gray-300 px-4 py-2 rounded hover:bg-gray-400" data-type="humidity">Humidity</button>
    </div>

    <!-- charts -->
    <div class="w-full max-w-4xl mt-4 bg-white p-4 rounded-2xl shadow">
        <canvas id="chart"></canvas>
    </div>

    <script type="module" src="js/script.js"></script>
</body>

</html>
